name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GTK3 + Python bindings
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            python3-numpy xvfb

      - name: Install simulators (GHDL + iverilog)
        run: |
          sudo apt-get install -y --no-install-recommends ghdl iverilog

      - name: Run GUI tests (headless)
        run: xvfb-run --auto-servernum python3 src/test_gui.py
        working-directory: ${{ github.workspace }}

      - name: Run GUI adversarial tests (headless)
        run: xvfb-run --auto-servernum python3 src/test_gui_adversarial.py
        working-directory: ${{ github.workspace }}

      - name: Run HDL adversarial tests (headless)
        run: xvfb-run --auto-servernum python3 src/test_hdl_adversarial.py
        working-directory: ${{ github.workspace }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            TESTING.md
            TESTING_adversarial.md
            TESTING_hdl_adversarial.md
